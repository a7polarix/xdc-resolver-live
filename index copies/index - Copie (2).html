        .inline-status { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem; }

<div class="container">
    <div class="card">
        <div class="header-flex">
            <div class="header-left">

                    <span>💝</span> <span data-i18n="donate">don</span>
                    <input type="number" id="donateAmount" placeholder="montant" step="any" value="1">
                    <button id="quickDonateBtn" data-i18n="send">envoyer</button>
                </div>
            </div>
            <div class="yiking-box" id="yikingBox">
                <div class="yiking-title"><span>🐉</span> Yi King</div>
                <div class="yiking-result" id="yikingResult"></div>
                <button id="yikingBtn" data-i18n="draw">Tirage</button>
            </div>
        </div>
        <div class="inline-status">
            <button id="connectBtn" data-i18n="connect">🔌 connecter</button>
            <div id="accountInfo" class="status" data-i18n="wallet_not_connected">wallet : non connecté</div>
            <div id="balanceInfo" class="status" data-i18n="balance">solde : --</div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 1rem; font-weight: 500;" data-i18n="send_to_domain">✎ envoyer à un domaine</h3>
        <div class="row">
            <div class="col">
                <label data-i18n="from_domain">depuis (domaine)</label>
                <input type="text" id="fromDomain" placeholder="ex: fleursdelys.xdc">
                <small data-i18n="optional">optionnel</small>
            </div>
            <div class="col">
                <label data-i18n="to_domain">vers (domaine ou adresse)</label>
                <input type="text" id="toDomain" placeholder="ex: gold.xdc">
            </div>
        </div>
        <div class="row">
            <div class="col">
                <label data-i18n="amount_label">montant</label>
                <input type="number" id="amount" placeholder="montant" step="any">
            </div>
            <div class="col">
                <label data-i18n="currency">devise</label>
                <select id="token">
                    <option value="XDC">XDC (natif)</option>
                    <option value="USDC">USDC</option>
                    <option value="CGO">CGO (Comtech Gold)</option>
                    <option value="SRX">SRX (StorX)</option>
                    <option value="PLI">PLI (Plugin)</option>
                    <option value="LBT">LBT (Law Blocks)</option>
                    <option value="FXD">FXD (Fathom Dollar)</option>
                </select>
            </div>
        </div>
        <button id="sendBtn" disabled data-i18n="send_btn">📤 envoyer</button>
        <div id="txStatus" class="status" style="margin-top: 1rem;"></div>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 0.75rem; font-weight: 500;" data-i18n="recent_invoice">🧾 facture récente</h3>
        <div id="donateStatus" class="status" style="background: #f4f6fa;"></div>
        <div id="invoiceContainer" class="invoice" style="display: none;"></div>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 0.75rem; font-weight: 500;" data-i18n="invoice_from_hash">🔍 générer facture depuis un hash</h3>
        <input type="text" id="invoiceHash" placeholder="hash de transaction (0x...)" style="margin-bottom: 0.5rem;">
        <button id="verifyHashBtn" style="width: auto;" data-i18n="verify_hash">vérifier le hash</button>
        <div style="display: flex; gap: 0.8rem; margin-top: 1rem;">
            <input type="text" id="invoiceFrom" placeholder="émetteur (adresse)" readonly style="flex:1; background:#f8fafc;">
            <input type="text" id="invoiceTo" placeholder="destinataire (adresse)" readonly style="flex:1; background:#f8fafc;">
        </div>
        <div style="display: flex; gap: 0.8rem; margin-top: 0.8rem;">
            <input type="number" id="invoiceAmount" placeholder="montant" step="any" readonly style="flex:2; background:#f8fafc;">
            <select id="invoiceSymbol" disabled style="flex:1;">
                <option>XDC</option><option>USDC</option><option>CGO</option><option>SRX</option><option>PLI</option><option>LBT</option><option>FXD</option>
            </select>
        </div>
        <button id="generateInvoiceBtn" style="margin-top: 1rem;" data-i18n="generate_invoice">générer la facture</button>
        <div id="manualInvoice" class="invoice" style="display: none; margin-top: 1rem;"></div>

</div>

    function castCoins() {
        let total = 0;
        for (let i = 0; i < 3; i++) total += Math.random() < 0.5 ? 2 : 3;
        return total;
    }

    function castHexagram() {
        const lines = [], changing = [];
        for (let i = 0; i < 6; i++) {
            const v = castCoins();
            lines.push(v % 2 === 0 ? 0 : 1);
            if (v === 6 || v === 9) changing.push(i);
        }
        return { lines, changing };
    }

    function getHexNum(lines) {
        let n = 0;
        for (let i = 0; i < 6; i++) if (lines[5 - i] === 1) n += Math.pow(2, i);
        return n;
    }

    function doReading() {
        const r = castHexagram();
        const num = getHexNum(r.lines);
        const data = ICHING[num - 1];
        let mutNum = null, mutData = null;
        if (r.changing.length > 0) {
            const mut = [...r.lines];
            r.changing.forEach(i => mut[i] = mut[i] === 0 ? 1 : 0);
            mutNum = getHexNum(mut);
            if (mutNum !== num) mutData = ICHING[mutNum - 1];
        }
        return { num, data, mutNum, mutData };
    }

    const yikingBtn = document.getElementById('yikingBtn');
    const yikingResult = document.getElementById('yikingResult');

    function triggerDraw() {
        yikingBtn.style.display = 'none';
        yikingResult.innerHTML = '<span class="dragon-anim">🐉</span>';
        yikingResult.style.display = 'flex';
        setTimeout(() => {
            const r = doReading();
            if (!r.data) { yikingResult.innerHTML = 'Erreur'; yikingBtn.style.display = 'inline-block'; return; }
            const name = r.data.name[browserLang] || r.data.name['en'];
            const interp = r.data.interp[browserLang] || r.data.interp['en'];
            let h = `<div class="yiking-hex">${r.data.symbol}</div><div class="yiking-name">${r.num}. ${name}</div><div class="yiking-interp">${interp}</div>`;
            if (r.mutData) {
                const mname = r.mutData.name[browserLang] || r.mutData.name['en'];
                const minterp = r.mutData.interp[browserLang] || r.mutData.interp['en'];
                h += `<div class="yiking-muted">→ ${r.mutNum}. ${r.mutData.symbol} ${mname}</div><div class="yiking-interp">${minterp}</div>`;
            }
            yikingResult.innerHTML = h;
            yikingResult.style.display = 'flex';
            yikingBtn.style.display = 'inline-block';
        }, 2000);
    }

    yikingBtn.addEventListener('click', triggerDraw);

    // ==================== INIT APP ====================
    window.addEventListener('load', () => {
        if (typeof ethers === 'undefined') { alert(t('ethers_not_loaded')); return; }
        initApp();
    });

    async function initApp() {
        let provider = null, signer = null, userAddress = null;
        const API_BASE = "https://fleurs-resolver-final.vercel.app";
        const API_RESOLVE = API_BASE + "/api/resolve";
        const API_INFO = API_BASE + "/api/info";
        const RPC_POOL = ["https://rpc.xdcrpc.com", "https://erpc.xdcrpc.com", "https://rpc.ankr.com/xdc", "https://rpc.xinfin.network", "https://rpc.xdc.org"];
        let rpcIdx = 0;
        const CONTRACT_ADDR = "0x295a7aB79368187a6CD03c464cfaAb04d799784E";
        const TOKEN_ADDRESSES = {
            USDC: "0xfA2958CB79b0491CC627c1557F441eF849Ca8eb1",
            CGO: "0x8f9920283470f52128bf11b0c14e798be704fd15",
            SRX: "0x5d5f074837f5d4618b3916ba74de1bf9662a3fed",
            PLI: "0xff7412ea7c8445c46a8254dfb557ac1e48094391",
            LBT: "0x05940b2df33d6371201e7ae099ced4c363855dfe",
            FXD: "0x49d3f7543335cf38Fa10889CCFF10207e22110B5"
        };
        const TOKEN_DECIMALS = { USDC: 6, CGO: 18, SRX: 18, PLI: 18, LBT: 18, FXD: 18 };
        const ADDRESS_TO_SYMBOL = Object.fromEntries(Object.entries(TOKEN_ADDRESSES).map(([s, a]) => [a.toLowerCase(), s]));
        const els = {
            connectBtn: document.getElementById('connectBtn'), sendBtn: document.getElementById('sendBtn'),
            accountInfo: document.getElementById('accountInfo'), balanceInfo: document.getElementById('balanceInfo'),
            txStatus: document.getElementById('txStatus'), donateStatus: document.getElementById('donateStatus'),
            invoiceContainer: document.getElementById('invoiceContainer'), manualInvoice: document.getElementById('manualInvoice'),
            fromDomain: document.getElementById('fromDomain'), toDomain: document.getElementById('toDomain'),
            amount: document.getElementById('amount'), token: document.getElementById('token'),
            quickDonateBtn: document.getElementById('quickDonateBtn'), donateAmount: document.getElementById('donateAmount'),
            invoiceHash: document.getElementById('invoiceHash'), verifyHashBtn: document.getElementById('verifyHashBtn'),
            invoiceFrom: document.getElementById('invoiceFrom'), invoiceTo: document.getElementById('invoiceTo'),
            invoiceAmount: document.getElementById('invoiceAmount'), invoiceSymbol: document.getElementById('invoiceSymbol'),
            generateInvoiceBtn: document.getElementById('generateInvoiceBtn')
        };

        function getRpc() { return RPC_POOL[rpcIdx % RPC_POOL.length]; }
        function switchRpc() { rpcIdx++; console.warn('RPC switch to ' + getRpc()); }
        function setDisconnected() {
            els.accountInfo.innerText = t('wallet_not_connected'); els.balanceInfo.innerText = t('balance');
            els.sendBtn.disabled = true; userAddress = null; signer = null; provider = null;
        }
        setDisconnected();
        function truncate(a) { return a ? `${a.slice(0,6)}...${a.slice(-4)}` : ''; }

        async function getDomainCategory(domain) {
            if (!domain || domain.startsWith('0x')) return null;
            try {
                const r = await fetch(`${API_BASE}/api/info?domain=${encodeURIComponent(domain)}`);
                if (r.ok) { const d = await r.json(); return d.category || null; }
            } catch(e) {}
            return null;
        }

        async function resolveDomain(domain) {
            if (domain.startsWith('0x') && domain.length === 42) return domain;
            try {
                const r = await fetch(`${API_RESOLVE}?domain=${encodeURIComponent(domain)}`);
                if (r.ok) { const d = await r.json(); if (d.result) return d.result; }
            } catch(e) {}
            for (let i = 0; i < RPC_POOL.length; i++) {
                try {
                    const p = new ethers.JsonRpcProvider(getRpc());
                    const c = new ethers.Contract(CONTRACT_ADDR, ["function getAddress(string) view returns (address)"], p);
                    const a = await c.getAddress(domain.toLowerCase().trim());
                    if (a && a !== "0x0000000000000000000000000000000000000000") return a;
                } catch(e) { switchRpc(); }
            }
            throw new Error(t('domain_not_resolved'));
        }

        async function fetchTxDetails(hash) {
            if (!provider) provider = new ethers.JsonRpcProvider(getRpc());
            const tx = await provider.getTransaction(hash);
            if (!tx) throw new Error(t('transaction_not_found'));
            let from = tx.from, to = tx.to, amount, symbol, nonce = tx.nonce;
            if (tx.value && tx.value !== 0n) {
                amount = parseFloat(ethers.formatEther(tx.value)); symbol = "XDC";
            } else {
                const rc = await provider.getTransactionReceipt(hash);
                if (!rc?.logs) throw new Error(t('no_logs'));
                const top = "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef";
                let found = false;
                for (const log of rc.logs) {
                    if (log.topics[0] === top) {
                        const sym = ADDRESS_TO_SYMBOL[log.address.toLowerCase()];
                        if (!sym) continue;
                        from = "0x" + log.topics[1].slice(26); to = "0x" + log.topics[2].slice(26);
                        amount = Number(ethers.formatUnits(ethers.toBigInt(log.data), TOKEN_DECIMALS[sym]));
                        symbol = sym; found = true; break;
                    }
                }
                if (!found) throw new Error(t('no_transfer'));
            }
            const block = await provider.getBlock(tx.blockNumber);
            const ts = new Date(block.timestamp * 1000).toISOString();
            const short = hash.slice(2,10);
            const invNum = `FDL-${new Date().getFullYear()}-${short}${nonce}`;
            return { amount, symbol, from, to, invoiceNumber: invNum, timestampUTC: ts };
        }

        async function qrDataURL(data, size=150) {
            const url = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(data)}`;
            const blob = await (await fetch(url)).blob();
            return new Promise(resolve => { const r = new FileReader(); r.onloadend = () => resolve(r.result); r.readAsDataURL(blob); });
        }

        async function displayInvoice(hash, amount, from, to, symbol, invNum, ts, catFrom=null, catTo=null) {
            try {
                if (catFrom === null && from && !from.startsWith('0x')) catFrom = await getDomainCategory(from);
                if (catTo === null && to && !to.startsWith('0x')) catTo = await getDomainCategory(to);
                const qr = await qrDataURL(JSON.stringify({ invoice: invNum, hash, from, to, amount, symbol, date: ts, explorer: `https://xdcscan.com/tx/${hash}` }));
                const data = { facture: { numero: invNum, emetteur: from, categorie_emetteur: catFrom, destinataire: to, categorie_destinataire: catTo, montant: amount, devise: symbol, date: ts, hash, lien: `https://xdcscan.com/tx/${hash}` } };
                const json = JSON.stringify(data, null, 2);
                const html = `<pre style="white-space:pre-wrap;">${json}</pre><div class="qr-code-img"><img src="${qr}" alt="QR"></div>
                    <div class="invoice-actions"><button class="copyJsonBtn">${t('copy_json')}</button><button class="copyHashBtn">${t('copy_hash')}</button><button id="saveBtn">${t('download_invoice')}</button></div>
                    <div class="hash-link">🔗 <a href="https://xdcscan.com/tx/${hash}" target="_blank">${t('view_on_xdcscan')}</a></div>`;
                els.invoiceContainer.innerHTML = html; els.invoiceContainer.style.display = 'block';
                els.invoiceContainer.querySelector('.copyJsonBtn').onclick = () => { navigator.clipboard.writeText(json); alert(t('json_copied')); };
                els.invoiceContainer.querySelector('.copyHashBtn').onclick = () => { navigator.clipboard.writeText(hash); alert(t('hash_copied')); };
                els.invoiceContainer.querySelector('#saveBtn').onclick = () => {
                    const fc = els.invoiceContainer.querySelector('pre').outerHTML;
                    const qrImg = els.invoiceContainer.querySelector('.qr-code-img img').src;
                    const full = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Facture ${invNum}</title><style>body{font-family:monospace;padding:20px;background:white}pre{white-space:pre-wrap}.qr-code-img{text-align:center;margin:20px 0}.qr-code-img img{width:150px;height:150px;border:1px solid #ddd;padding:5px}.hash-link{margin-top:20px;font-size:12px}</style></head><body>${fc}<div class="qr-code-img"><img src="${qrImg}"></div><div class="hash-link">🔗 <a href="https://xdcscan.com/tx/${hash}">${t('view_on_xdcscan')}</a></div></body></html>`;
                    const blob = new Blob([full], { type: "text/html" });
                    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `facture_${invNum}.html`; a.click();
                    alert(t('invoice_downloaded'));
                };
            } catch(e) { els.txStatus.innerHTML += `<br>${t('invoice_gen_failed')} ${e.message}`; }
        }

        async function donate(amt) {
            if (!signer) return alert(t('connect_wallet'));
            if (isNaN(amt) || amt <= 0) return;
            els.donateStatus.innerHTML = "⏳ " + t('send') + "...";
            try {
                const target = await resolveDomain("fleursdelys.xdc");
                const fromDisp = els.fromDomain.value || truncate(userAddress);
                const tx = await signer.sendTransaction({ to: target, value: ethers.parseEther(amt.toString()) });
                els.donateStatus.innerHTML = `${t('tx_sent')} ${tx.hash.slice(0,10)}...`;
                await tx.wait();
                els.donateStatus.innerHTML = `${t('donation_success')} ${amt} XDC ${t('donation_to')}`;
                const d = await fetchTxDetails(tx.hash);
                await displayInvoice(tx.hash, amt, fromDisp, 'fleursdelys.xdc', 'XDC', d.invoiceNumber, d.timestampUTC);
            } catch(e) { els.donateStatus.innerHTML = '❌ ' + e.message; }
        }

        els.connectBtn.onclick = async () => {
            if (!window.ethereum) return alert(t('install_wallet'));
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                userAddress = await signer.getAddress();
                els.accountInfo.innerHTML = `✅ ${truncate(userAddress)}`;
                els.balanceInfo.innerHTML = `💰 ${ethers.formatEther(await provider.getBalance(userAddress))} XDC`;
                els.sendBtn.disabled = false;
                window.ethereum.on('accountsChanged', () => location.reload());
            } catch(e) { alert(e.message); setDisconnected(); }
        };

        els.quickDonateBtn.onclick = () => { const a = parseFloat(els.donateAmount.value); if (!isNaN(a) && a>0) donate(a); else alert(t('invalid_amount')); };
        els.sendBtn.onclick = async () => {
            const to = els.toDomain.value.trim(), amt = parseFloat(els.amount.value), tok = els.token.value, from = els.fromDomain.value.trim();
            if (!to || isNaN(amt) || amt <= 0) return alert(t('fill_fields'));
            if (!signer) return alert(t('connect_wallet'));
            els.txStatus.innerHTML = t('verifying_sender');
            try {
                if (from && !from.startsWith('0x')) {
                    const r = await resolveDomain(from);
                    if (r.toLowerCase() !== userAddress.toLowerCase()) { els.txStatus.innerHTML = t('sender_mismatch'); return; }
                }
                const target = to.startsWith('0x') && to.length===42 ? to : await resolveDomain(to);
                els.txStatus.innerHTML = `${t('sending')} ${amt} ${tok}...`;
                let tx;
                if (tok === "XDC") {
                    tx = await signer.sendTransaction({ to: target, value: ethers.parseEther(amt.toString()) });
                } else {
                    const addr = TOKEN_ADDRESSES[tok]; if (!addr) throw new Error(t('token_not_supported'));
                    const c = new ethers.Contract(addr, ["function transfer(address,uint256) returns (bool)"], signer);
                    tx = await c.transfer(target, ethers.parseUnits(amt.toString(), TOKEN_DECIMALS[tok]));
                }
                els.txStatus.innerHTML += `<br>${t('tx_sent')} ${tx.hash.slice(0,10)}...`;
                await tx.wait();
                els.txStatus.innerHTML += `<br>${t('success')}`;
                const fromDisp = from || truncate(userAddress);
                const d = await fetchTxDetails(tx.hash);
                await displayInvoice(tx.hash, amt, fromDisp, to, tok, d.invoiceNumber, d.timestampUTC);
            } catch(e) { els.txStatus.innerHTML += `<br>❌ ${e.message}`; }
        };

        els.verifyHashBtn.onclick = async () => {
            const h = els.invoiceHash.value.trim();
            if (!h?.startsWith('0x') || h.length<66) return alert(t('invalid_hash'));
            els.manualInvoice.style.display = 'none';
            try {
                if (!provider) provider = new ethers.JsonRpcProvider(getRpc());
                const { amount, symbol, from, to, invoiceNumber, timestampUTC } = await fetchTxDetails(h);
                els.invoiceAmount.value = amount; els.invoiceSymbol.value = symbol; els.invoiceSymbol.disabled = true;
                els.invoiceFrom.value = from; els.invoiceTo.value = to;
                alert(`${t('verified')} ${amount} ${symbol}`);
                window._pendingManual = { hash:h, amount, symbol, from, to, invoiceNumber, timestampUTC, catFrom:null, catTo:null };
            } catch(e) { alert(e.message); }
        };

        els.generateInvoiceBtn.onclick = async () => {
            const p = window._pendingManual; if (!p) return alert(t('verify_first'));
            const qr = await qrDataURL(JSON.stringify({ invoice: p.invoiceNumber, hash: p.hash, from: p.from, to: p.to, amount: p.amount, symbol: p.symbol, date: p.timestampUTC, explorer: `https://xdcscan.com/tx/${p.hash}` }));
            const data = { facture: { numero: p.invoiceNumber, emetteur: p.from, categorie_emetteur: p.catFrom, destinataire: p.to, categorie_destinataire: p.catTo, montant: p.amount, devise: p.symbol, date: p.timestampUTC, hash: p.hash, lien: `https://xdcscan.com/tx/${p.hash}` } };
            const json = JSON.stringify(data, null, 2);
            const html = `<pre style="white-space:pre-wrap;">${json}</pre><div class="qr-code-img"><img src="${qr}" alt="QR"></div>
                <div class="invoice-actions"><button class="copyJsonBtn">${t('copy_json')}</button><button class="copyHashBtn">${t('copy_hash')}</button><button id="saveBtn">${t('download_invoice')}</button></div>
                <div class="hash-link">🔗 <a href="https://xdcscan.com/tx/${p.hash}" target="_blank">${t('view_on_xdcscan')}</a></div>`;
            els.manualInvoice.innerHTML = html; els.manualInvoice.style.display = 'block';
            els.manualInvoice.querySelector('.copyJsonBtn').onclick = () => { navigator.clipboard.writeText(json); alert(t('json_copied')); };
            els.manualInvoice.querySelector('.copyHashBtn').onclick = () => { navigator.clipboard.writeText(p.hash); alert(t('hash_copied')); };
            els.manualInvoice.querySelector('#saveBtn').onclick = () => {
                const fc = els.manualInvoice.querySelector('pre').outerHTML;
                const qrImg = els.manualInvoice.querySelector('.qr-code-img img').src;
                const full = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Facture ${p.invoiceNumber}</title><style>body{font-family:monospace;padding:20px;background:white}pre{white-space:pre-wrap}.qr-code-img{text-align:center;margin:20px 0}.qr-code-img img{width:150px;height:150px;border:1px solid #ddd;padding:5px}.hash-link{margin-top:20px;font-size:12px}</style></head><body>${fc}<div class="qr-code-img"><img src="${qrImg}"></div><div class="hash-link">🔗 <a href="https://xdcscan.com/tx/${p.hash}">${t('view_on_xdcscan')}</a></div></body></html>`;
                const blob = new Blob([full], { type: "text/html" });
                const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `facture_${p.invoiceNumber}.html`; a.click();
                alert(t('invoice_downloaded'));
            };
        };
    }
