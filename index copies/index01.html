<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fleurs de Lys API</title>
    <style>
        body { font-family: system-ui; max-width: 800px; margin: 40px auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .title { flex: 1; }
        .donate-area { text-align: right; }
        .donate-buttons { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; flex-wrap: wrap; }
        .donate-buttons button { background: #28a745; }
        .custom-donate-row { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
        .row { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .col { flex: 1; min-width: 150px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { background: #0070f3; color: white; border: none; cursor: pointer; border-radius: 6px; }
        button:disabled { background: #ccc; }
        .donate-section { background: #f9f9f9; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px solid #e0e0e0; }
        #status, #donateStatus { margin-top: 20px; background: #f5f5f5; padding: 12px; border-radius: 8px; word-break: break-all; }
        .error { color: red; }
        .success { color: green; }
        .invoice { background: #fff; border: 1px solid #ccc; padding: 15px; border-radius: 8px; margin-top: 15px; white-space: pre-wrap; font-family: monospace; }
        .invoice-actions { display: flex; gap: 10px; margin-top: 10px; }
        .invoice-actions button { width: auto; padding: 5px 10px; background: #6c757d; }
        footer { margin-top: 40px; text-align: center; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">
            <h1>🌿 Fleurs de Lys API</h1>
            <p class="header-sub">xdcdomain .xdc .rwa .depin</p>
        </div>
        <div class="donate-area">
            <button id="quickDonateBtn" style="background:#28a745; padding:10px 20px;">💝 Faire un don</button>
            <div class="donate-buttons">
                <button id="donate1">1 XDC</button>
                <button id="donate10">10 XDC</button>
                <button id="donate100">100 XDC</button>
                <button id="donateCustomBtn">Personnalisé</button>
            </div>
            <div id="customDonateArea" style="display:none; margin-top:8px;">
                <input type="number" id="customAmount" placeholder="Montant" step="any">
                <button id="sendCustomDonate">Envoyer</button>
            </div>
        </div>
    </div>

    <button id="connectBtn">Connecter le wallet</button>
    <div id="accountInfo" style="margin:10px 0;"></div>

    <div id="donateStatusArea">
        <h3>✨ Dons récents / statut</h3>
        <div id="donateStatus"></div>
        <div id="invoiceContainer" class="invoice" style="display:none;"></div>
    </div>

    <hr>

    <h2>Envoyer à n’importe quel domaine .xdc</h2>
    <div class="row">
        <div class="col">
            <label>Depuis (votre domaine)</label>
            <input type="text" id="fromDomain" placeholder="ex: fleursdelys.xdc">
            <small>Détecté automatiquement (modifiable).</small>
        </div>
        <div class="col">
            <label>Vers (domaine destinataire)</label>
            <input type="text" id="toDomain" placeholder="ex: gold.xdc">
        </div>
    </div>
    <div class="row">
        <div class="col">
            <label>Montant</label>
            <input type="number" id="amount" placeholder="Montant" step="any">
        </div>
        <div class="col">
            <label>Devise</label>
            <select id="token">
                <option value="XDC">XDC</option>
                <option value="USDC">USDC (natif)</option>
                <option value="CGO">CGO - Comtech Gold</option>
            </select>
        </div>
    </div>
    <button id="sendBtn" disabled>Envoyer</button>
    <div id="status"></div>

    <div class="invoice-zone">
        <h3>🧾 Générer une facture à partir d'un hash (vérifié)</h3>
        <input type="text" id="invoiceHash" placeholder="Hash de transaction (0x...)" style="width:100%;">
        <button id="verifyHashBtn">Vérifier le hash</button>
        <input type="text" id="invoiceFrom" placeholder="Émetteur (domaine ou adresse)" style="width:100%; margin-top:5px;">
        <input type="text" id="invoiceTo" placeholder="Destinataire (domaine ou adresse)" style="width:100%;">
        <div style="display:flex; gap:10px;">
            <input type="number" id="invoiceAmount" placeholder="Montant" step="any" readonly class="fixed-field" style="flex:2;">
            <select id="invoiceSymbol" disabled style="flex:1;">
                <option value="XDC">XDC</option>
                <option value="USDC">USDC</option>
                <option value="CGO">CGO</option>
            </select>
        </div>
        <button id="generateInvoiceBtn">Générer la facture</button>
        <div id="manualInvoice" class="invoice" style="display:none;"></div>
    </div>

    <footer>© 2026 FocalZero (@focalzero) – Tous droits réservés.</footer>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.16.0/dist/ethers.umd.min.js"></script>
    <script>
        window.addEventListener('load', () => { if (typeof ethers !== 'undefined') initApp(); else alert("ethers non chargé"); });

        async function initApp() {
            let provider, signer, userAddress;
            const API_URL = "/api/resolve";
            const TOKEN_ADDRESSES = { USDC: "0xfA2958CB79b0491CC627c1557F441eF849Ca8eb1", CGO: "0x8f9920283470f52128bf11b0c14e798be704fd15" };
            const TOKEN_DECIMALS = { USDC: 6, CGO: 18 };
            const ADDRESS_TO_SYMBOL = { [TOKEN_ADDRESSES.USDC.toLowerCase()]: "USDC", [TOKEN_ADDRESSES.CGO.toLowerCase()]: "CGO" };

            const elements = {
                connectBtn: document.getElementById('connectBtn'), sendBtn: document.getElementById('sendBtn'),
                accountInfo: document.getElementById('accountInfo'), status: document.getElementById('status'),
                donateStatus: document.getElementById('donateStatus'), invoiceContainer: document.getElementById('invoiceContainer'),
                manualInvoice: document.getElementById('manualInvoice'), fromDomain: document.getElementById('fromDomain'),
                toDomain: document.getElementById('toDomain'), amount: document.getElementById('amount'), token: document.getElementById('token'),
                quickDonateBtn: document.getElementById('quickDonateBtn'), donate1: document.getElementById('donate1'),
                donate10: document.getElementById('donate10'), donate100: document.getElementById('donate100'),
                donateCustomBtn: document.getElementById('donateCustomBtn'), customDonateArea: document.getElementById('customDonateArea'),
                customAmount: document.getElementById('customAmount'), sendCustomDonate: document.getElementById('sendCustomDonate'),
                invoiceHash: document.getElementById('invoiceHash'), verifyHashBtn: document.getElementById('verifyHashBtn'),
                invoiceFrom: document.getElementById('invoiceFrom'), invoiceTo: document.getElementById('invoiceTo'),
                invoiceAmount: document.getElementById('invoiceAmount'), invoiceSymbol: document.getElementById('invoiceSymbol'),
                generateInvoiceBtn: document.getElementById('generateInvoiceBtn')
            };

            function truncate(addr) { return addr ? `${addr.slice(0,6)}...${addr.slice(-4)}` : ''; }

            async function fetchTransactionDetails(txHash) {
                if (!provider) throw new Error("Provider non disponible.");
                const tx = await provider.getTransaction(txHash);
                if (!tx) throw new Error("Transaction introuvable");
                let from = tx.from, to = tx.to, amount, symbol;
                if (tx.value && tx.value !== 0n) {
                    amount = parseFloat(ethers.formatEther(tx.value));
                    symbol = "XDC";
                } else {
                    const receipt = await provider.getTransactionReceipt(txHash);
                    if (!receipt?.logs) throw new Error("Impossible de récupérer les logs");
                    const transferTopic = "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef";
                    let found = false;
                    for (const log of receipt.logs) {
                        if (log.topics[0] === transferTopic) {
                            const tokenAddress = log.address.toLowerCase();
                            const sym = ADDRESS_TO_SYMBOL[tokenAddress];
                            if (!sym) continue;
                            from = "0x" + log.topics[1].slice(26);
                            to = "0x" + log.topics[2].slice(26);
                            amount = Number(ethers.formatUnits(ethers.toBigInt(log.data), TOKEN_DECIMALS[sym]));
                            symbol = sym;
                            found = true;
                            break;
                        }
                    }
                    if (!found) throw new Error("Aucun transfert détecté");
                }
                return { amount, symbol, from, to };
            }

            elements.verifyHashBtn.onclick = async () => {
                const hash = elements.invoiceHash.value.trim();
                if (!hash?.startsWith('0x') || hash.length < 66) return alert("Hash invalide.");
                if (!provider) return alert("Connectez votre wallet.");
                elements.manualInvoice.style.display = 'none';
                try {
                    const { amount, symbol, from, to } = await fetchTransactionDetails(hash);
                    elements.invoiceAmount.value = amount;
                    elements.invoiceSymbol.value = symbol;
                    elements.invoiceSymbol.disabled = true;
                    elements.invoiceFrom.value = from;
                    elements.invoiceTo.value = to;
                    alert(`✅ Transaction vérifiée : ${amount} ${symbol}\nÉmetteur : ${from}\nDestinataire : ${to}`);
                } catch (err) { alert("Erreur : " + err.message); }
            };

            elements.generateInvoiceBtn.onclick = () => {
                const hash = elements.invoiceHash.value.trim();
                const from = elements.invoiceFrom.value.trim();
                const to = elements.invoiceTo.value.trim();
                const amount = parseFloat(elements.invoiceAmount.value);
                const symbol = elements.invoiceSymbol.value;
                if (!hash || !from || !to || isNaN(amount) || amount <= 0 || !elements.invoiceSymbol.disabled)
                    return alert("Vérifiez le hash d'abord et remplissez tous les champs.");
                const date = new Date().toLocaleString();
                const invoiceData = {
                    facture: { emetteur: from, destinataire: to, montant: amount, devise: symbol, date: date, hash: hash, lien: `https://xdcscan.com/tx/${hash}` }
                };
                const jsonStr = JSON.stringify(invoiceData, null, 2);
                const html = `<pre style="white-space:pre-wrap;">${jsonStr}</pre>
                             <div class="invoice-actions"><button class="copyJsonBtn">Copier le JSON</button><button class="copyHashBtn">Copier le hash</button><button id="saveInvoiceFileBtn">Sauvegarder la facture</button></div>
                             <div class="hash-link">🔗 <a href="https://xdcscan.com/tx/${hash}" target="_blank">Voir la transaction sur XDCScan</a></div>`;
                elements.manualInvoice.innerHTML = html;
                elements.manualInvoice.style.display = 'block';
                const copyJson = elements.manualInvoice.querySelector('.copyJsonBtn');
                copyJson?.addEventListener('click', () => { navigator.clipboard.writeText(jsonStr); alert("JSON copié"); });
                const copyHash = elements.manualInvoice.querySelector('.copyHashBtn');
                copyHash?.addEventListener('click', () => { navigator.clipboard.writeText(hash); alert("Hash copié"); });
                const saveBtn = elements.manualInvoice.querySelector('#saveInvoiceFileBtn');
                saveBtn?.addEventListener('click', () => {
                    const content = `Facture\nÉmetteur : ${from}\nDestinataire : ${to}\nMontant : ${amount} ${symbol}\nDate : ${date}\nHash : ${hash}\nLien : https://xdcscan.com/tx/${hash}`;
                    const blob = new Blob([content], { type: "text/plain" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `facture_${hash.slice(0,10)}.txt`;
                    a.click();
                    URL.revokeObjectURL(url);
                });
            };

            async function resolveDomain(domain) {
                if (domain.startsWith('0x') && domain.length === 42) return domain;
                const res = await fetch(`${API_URL}?domain=${encodeURIComponent(domain)}`);
                const data = await res.json();
                if (!data.result) throw new Error(data.error || "Résolution impossible");
                if (!data.result.startsWith('0x')) throw new Error("Format invalide");
                return data.result;
            }

            async function sendDonation(amountXDC) {
                if (!signer) return elements.donateStatus.innerHTML = '<span class="error">Connectez wallet.</span>';
                if (isNaN(amountXDC) || amountXDC <= 0) return;
                elements.donateStatus.innerHTML = "⏳ Résolution...";
                try {
                    const target = await resolveDomain("fleursdelys.xdc");
                    const fromDisplay = elements.fromDomain.value || truncate(userAddress);
                    const tx = await signer.sendTransaction({ to: target, value: ethers.parseEther(amountXDC.toString()) });
                    elements.donateStatus.innerHTML = `📡 Tx: ${tx.hash.slice(0,10)}...`;
                    await tx.wait();
                    elements.donateStatus.innerHTML = `<span class="success">✅ Merci ! ${amountXDC} XDC envoyés.</span>`;
                    displayInvoice(tx.hash, amountXDC, fromDisplay, 'fleursdelys.xdc', 'XDC');
                    elements.invoiceHash.value = tx.hash;
                    // Optionnel : pré-remplir automatiquement la section facture basse
                    await autoFillInvoiceFromHash(tx.hash);
                } catch (err) { elements.donateStatus.innerHTML = `<span class="error">❌ ${err.message}</span>`; }
            }

            async function autoFillInvoiceFromHash(hash) {
                try {
                    const { amount, symbol, from, to } = await fetchTransactionDetails(hash);
                    elements.invoiceAmount.value = amount;
                    elements.invoiceSymbol.value = symbol;
                    elements.invoiceSymbol.disabled = true;
                    elements.invoiceFrom.value = from;
                    elements.invoiceTo.value = to;
                } catch (e) { console.warn("Auto fill failed", e); }
            }

            function displayInvoice(txHash, amount, from, to, symbol) {
                const date = new Date().toLocaleString();
                const invoiceData = {
                    facture: { emetteur: from, destinataire: to, montant: amount, devise: symbol, date: date, hash: txHash, lien: `https://xdcscan.com/tx/${txHash}` }
                };
                const jsonStr = JSON.stringify(invoiceData, null, 2);
                const html = `<pre style="white-space:pre-wrap;">${jsonStr}</pre>
                             <div class="invoice-actions"><button class="copyJsonBtn">Copier le JSON</button><button class="copyHashBtn">Copier le hash</button><button id="saveInvoiceFileBtn">Sauvegarder la facture</button></div>
                             <div class="hash-link">🔗 <a href="https://xdcscan.com/tx/${txHash}" target="_blank">Voir la transaction sur XDCScan</a></div>`;
                elements.invoiceContainer.innerHTML = html;
                elements.invoiceContainer.style.display = 'block';
                const copyJson = elements.invoiceContainer.querySelector('.copyJsonBtn');
                copyJson?.addEventListener('click', () => { navigator.clipboard.writeText(jsonStr); alert("JSON copié"); });
                const copyHash = elements.invoiceContainer.querySelector('.copyHashBtn');
                copyHash?.addEventListener('click', () => { navigator.clipboard.writeText(txHash); alert("Hash copié"); });
                const saveBtn = elements.invoiceContainer.querySelector('#saveInvoiceFileBtn');
                saveBtn?.addEventListener('click', () => {
                    const content = `Facture\nÉmetteur : ${from}\nDestinataire : ${to}\nMontant : ${amount} ${symbol}\nDate : ${date}\nHash : ${txHash}\nLien : https://xdcscan.com/tx/${txHash}`;
                    const blob = new Blob([content], { type: "text/plain" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `facture_${txHash.slice(0,10)}.txt`;
                    a.click();
                    URL.revokeObjectURL(url);
                });
            }

            elements.connectBtn.onclick = async () => {
                if (!window.ethereum) return alert("Installez MetaMask/XDCPay.");
                try {
                    provider = new ethers.BrowserProvider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = await provider.getSigner();
                    userAddress = await signer.getAddress();
                    elements.accountInfo.innerHTML = `Connecté : ${truncate(userAddress)}`;
                    elements.sendBtn.disabled = false;
                    elements.fromDomain.value = "";
                } catch (e) { alert("Erreur : " + e.message); }
            };

            elements.donate1.onclick = () => sendDonation(1);
            elements.donate10.onclick = () => sendDonation(10);
            elements.donate100.onclick = () => sendDonation(100);
            elements.quickDonateBtn.onclick = () => document.getElementById('donateStatusArea').scrollIntoView({ behavior: 'smooth' });
            elements.donateCustomBtn.onclick = () => elements.customDonateArea.style.display = elements.customDonateArea.style.display === 'none' ? 'flex' : 'none';
            elements.sendCustomDonate.onclick = () => {
                const amount = parseFloat(elements.customAmount.value);
                if (!isNaN(amount) && amount > 0) sendDonation(amount);
                else elements.donateStatus.innerHTML = '<span class="error">Montant invalide</span>';
                elements.customDonateArea.style.display = 'none';
                elements.customAmount.value = '';
            };

            elements.sendBtn.onclick = async () => {
                const toRaw = elements.toDomain.value.trim();
                const amount = parseFloat(elements.amount.value);
                const token = elements.token.value;
                if (!toRaw || isNaN(amount) || amount <= 0) return alert("Remplissez les champs.");
                if (!signer) return alert("Connectez wallet.");
                elements.status.innerHTML = "🔍 Résolution...";
                try {
                    let target;
                    if (toRaw.startsWith('0x') && toRaw.length === 42) target = toRaw;
                    else target = await resolveDomain(toRaw);
                    elements.status.innerHTML += `<br>⏳ Envoi de ${amount} ${token}...`;
                    let tx;
                    if (token === "XDC") {
                        tx = await signer.sendTransaction({ to: target, value: ethers.parseEther(amount.toString()) });
                    } else {
                        const tokenAddr = TOKEN_ADDRESSES[token];
                        if (!tokenAddr) throw new Error("Token non supporté");
                        const contract = new ethers.Contract(tokenAddr, ["function transfer(address to, uint256 amount) public returns (bool)"], signer);
                        const rawAmount = ethers.parseUnits(amount.toString(), TOKEN_DECIMALS[token]);
                        tx = await contract.transfer(target, rawAmount);
                    }
                    elements.status.innerHTML += `<br>📡 Tx: ${tx.hash.slice(0,10)}...`;
                    await tx.wait();
                    elements.status.innerHTML += `<br><span class="success">✅ Succès !</span>`;
                    const fromDisplay = elements.fromDomain.value.trim() || truncate(userAddress);
                    displayInvoice(tx.hash, amount, fromDisplay, toRaw, token);
                    elements.invoiceHash.value = tx.hash;
                    // Auto-remplir la section de génération de facture
                    await autoFillInvoiceFromHash(tx.hash);
                } catch (err) { elements.status.innerHTML += `<br><span class="error">❌ ${err.message}</span>`; }
            };
        }
    </script>
</body>
</html>
